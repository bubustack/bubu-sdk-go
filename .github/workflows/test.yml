name: Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-test:
    name: Go 1.26.2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      - name: Run tests
        run: make test

  race-and-coverage:
    name: Race and coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      - name: Run race detector with coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage.out
          path: coverage.out

  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...

  api-compat:
    name: API compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      - name: Install gorelease
        run: go install golang.org/x/exp/cmd/gorelease@latest

      - name: Run API compatibility check
        run: |
          git fetch --tags --force
          if git tag --list 'v*' | grep -q .; then
            "$(go env GOPATH)/bin/gorelease"
          else
            echo "No release tags found; skipping API compatibility bootstrap check."
          fi

  envtest:
    name: Envtest ${{ matrix.k8s-version }}
    runs-on: ubuntu-latest
    needs: go-test
    strategy:
      fail-fast: false
      matrix:
        k8s-version: ['1.26.x', '1.27.x', '1.28.x', '1.29.x', '1.30.x', '1.31.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      - name: Setup envtest assets
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          KUBEBUILDER_ASSETS=$($(go env GOPATH)/bin/setup-envtest use -p path --arch amd64 --os linux ${{ matrix.k8s-version }})
          echo "KUBEBUILDER_ASSETS=$KUBEBUILDER_ASSETS" >> "$GITHUB_ENV"

      - name: Run envtest smoke tests
        run: go test -tags=integration ./integration/...
